<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Masalar | Maya</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0d0b; --surface: #151512; --border: rgba(255,255,255,0.07); --gold: #c9a84c; --text: #f0ece2; --muted: #8a8778; --radius: 12px; }
        body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; }
        .sidebar { width: 240px; background: var(--surface); height: 100vh; position: fixed; border-right: 1px solid var(--border); }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 15px; color: var(--muted); text-decoration: none; }
        .nav-item.active { color: var(--gold); background: rgba(201,168,76,0.1); }
        .main { flex: 1; margin-left: 240px; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 25px; text-align: center; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div style="padding: 30px; font-family: 'Playfair Display'; font-size: 24px; color: var(--gold);">MAYA</div>
        <nav>
            <a href="/" class="nav-item">📊 Genel Bakış</a>
            <a href="/masalar" class="nav-item active">🪑 Masalar</a>
            <a href="/musteriler" class="nav-item">👥 Müşteriler</a>
            <a href="/menu" class="nav-item">🍽️ Menü / Ürünler</a>
            <a href="/siparisler" class="nav-item">🧾 Siparişler</a>
        </nav>
    </aside>

    <main class="main">
        <h2 style="font-family: 'Playfair Display'; color: var(--gold); margin-bottom: 30px;">🪑 Restoran Masaları</h2>
        <div class="grid">
            {% for m in masalar %}
            <div class="card">
                <div style="font-family: 'Playfair Display'; font-size: 22px; color: var(--gold);">Masa #{{ m.Masa_ID }}</div>
                <div style="color: var(--muted); font-size: 13px; margin: 10px 0;">{{ m.Konum }}</div>
                <div style="font-size: 12px; font-weight: bold;">{{ m.Kapasite }} Kişilik</div>
            </div>
            {% endfor %}
        </div>
    </main>
</body>
</html>
