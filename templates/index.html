<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MAYA | Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-name">MAYA</div>
            <div class="logo-sub">Yönetim Sistemi</div>
        </div>
        <nav>
            <a href="/" class="nav-item active">📊 Genel Bakış</a>
            <a href="/masalar" class="nav-item">🪑 Masalar</a>
            <a href="/musteriler" class="nav-item">👥 Müşteriler</a>
            <a href="/menu" class="nav-item">🍽️ Menü / Ürünler</a>
            <a href="/siparisler" class="nav-item">🧾 Siparişler</a>
        </nav>
    </aside>

    <main class="main">
        <h1 style="font-family: 'Playfair Display'; color: var(--gold); text-align: center; margin-bottom: 30px;">MAYA RESTORAN</h1>
        
        <div class="card">
            <h3 style="color: var(--gold); margin-bottom: 20px;">Canlı Masa Durumu</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px;">
                {% for m in masalar %}
                <div class="table-slot {{ m.durum }}" style="padding: 15px; text-align: center;">
                    <div style="font-size: 20px; color: var(--gold);">{{ m.Masa_ID }}</div>
                    <div style="font-size: 10px; color: var(--muted);">{{ m.Konum }}</div>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="card">
            <h3 style="color: var(--gold);">Hızlı Rezervasyon</h3>
            <form action="/rezervasyon-olustur" method="POST" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px;">
                <input type="text" name="ad" placeholder="Ad" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <input type="text" name="soyad" placeholder="Soyad" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <input type="text" name="telefon" placeholder="Telefon" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <input type="date" name="tarih" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <input type="time" name="saat" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <input type="number" name="masa_id" placeholder="Masa No" required style="padding: 12px; background: #0d0d0b; border: 1px solid #333; color: white; border-radius: 6px;">
                <button type="submit" style="grid-column: span 3; background: var(--gold); color: black; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer;">Rezervasyonu Tamamla</button>
            </form>
        </div>
    </main>
</body>
</html>
